name: Auto-merge routine PRs

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  automerge:
    # Accept only branches from this repository; path rules are provider-neutral.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Path guard + merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          # Routine PRs may modify only generated reports and the ledger.
          gh api "repos/${{ github.repository }}/pulls/${PR_NUM}/files" --paginate --jq '.[].filename' > files.txt
          bad=$(grep -vE '^(ideas/|ledger\.tsv$)' files.txt || true)
          if [ -n "$bad" ]; then
            echo "Paths outside the routine output surface; skipping auto-merge:" >&2
            echo "$bad" >&2
            gh pr comment "$PR_URL" --body "Auto-merge skipped: changes outside ideas/ and ledger.tsv require review."
            exit 0
          fi
          # Mergeability can lag after synchronization, so retry briefly.
          for i in 1 2 3 4 5; do
            gh pr merge --squash --delete-branch "$PR_URL" && exit 0
            sleep 15
          done
          echo "auto-merge failed after retries" >&2
          exit 1
