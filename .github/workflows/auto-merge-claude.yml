name: Auto-merge Claude routine PRs

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  automerge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR (squash)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # mergeability 检查可能有延迟，重试几次
          for i in 1 2 3 4 5; do
            gh pr merge --squash --delete-branch "$PR_URL" && exit 0
            sleep 15
          done
          echo "auto-merge failed after retries" >&2
          exit 1
